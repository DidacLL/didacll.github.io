name: Deploy AgenticCareerBoost

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout AgenticCareerBoost
        uses: actions/checkout@v4
        with:
          repository: DidacLL/AgenticCareerBoost
          ref: main
          path: source

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare artifact
        run: touch source/site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: source/site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
